services:
  - type: web
    name: stock-price-predictor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn app:app --workers 2 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_DIR
        value: /tmp
      - key: PYTHON_VERSION
        value: 3.11.9
